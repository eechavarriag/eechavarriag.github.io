<svg viewBox="0 0 820 1330" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'Segoe UI', Arial, sans-serif">
  <title>GIS Analysis Workflow: Urban Heat and Tree Equity in Ann Arbor</title>
  <desc>Five-stage pipeline: Data Collection, Remote Sensing Processing in Google Earth Engine, Spatial Analysis in ArcGIS Pro, Dashboard Development in ArcGIS Online, and Output and Impact for the City of Ann Arbor Office of Sustainability and Innovations urban heat island project.</desc>

  <!-- Title block -->
  <text x="410" y="45" text-anchor="middle" font-size="30" font-weight="700" fill="#7a2e12">GIS Analysis Workflow</text>
  <text x="410" y="74" text-anchor="middle" font-size="16" fill="#4a3a2e">Mapping Urban Heat Islands &amp; Tree Equity</text>
  <text x="410" y="96" text-anchor="middle" font-size="13.5" fill="#6b5c4e" font-style="italic">City of Ann Arbor, Office of Sustainability &amp; Innovations</text>

  <!-- ===== CARD 1: Data Collection (140-340) ===== -->
  <rect x="70" y="140" width="680" height="200" rx="14" fill="#faf1e6" stroke="#e8d9c3" stroke-width="1.5"/>
  <rect x="70" y="140" width="6" height="200" rx="3" fill="#c1440e"/>
  <circle cx="140" cy="240" r="34" fill="#c1440e"/>
  <polyline points="120,226 140,234 160,226" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="120,240 140,248 160,240" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="120,254 140,262 160,254" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="195" y="186" font-size="24" font-weight="700" fill="#5c2a12">1. Data Collection</text>
  <text x="195" y="214" font-size="15" fill="#4a3a2e">&#8226; Landsat-derived land surface temperature (LST) imagery</text>
  <text x="195" y="240" font-size="15" fill="#4a3a2e">&#8226; Tree canopy and impervious surface layers</text>
  <text x="195" y="266" font-size="15" fill="#4a3a2e">&#8226; Census demographic data (block &amp; block group scale)</text>
  <text x="195" y="292" font-size="15" fill="#4a3a2e">&#8226; Municipal GIS datasets, incl. public land ownership</text>

  <!-- Arrow 1 -->
  <line x1="410" y1="340" x2="410" y2="372" stroke="#c1440e" stroke-width="3"/>
  <polygon points="401,371 419,371 410,381" fill="#c1440e"/>

  <!-- ===== CARD 2: Remote Sensing Processing (380-580) ===== -->
  <rect x="70" y="380" width="680" height="200" rx="14" fill="#faf1e6" stroke="#e8d9c3" stroke-width="1.5"/>
  <rect x="70" y="380" width="6" height="200" rx="3" fill="#c1440e"/>
  <circle cx="140" cy="480" r="34" fill="#c1440e"/>
  <rect x="136" y="456" width="8" height="30" rx="4" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="140" cy="492" r="9" fill="#ffffff"/>
  <line x1="140" y1="486" x2="140" y2="462" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <text x="195" y="426" font-size="24" font-weight="700" fill="#5c2a12">2. Remote Sensing Processing</text>
  <text x="195" y="454" font-size="15" fill="#4a3a2e">&#8226; Processed Landsat imagery in Google Earth Engine</text>
  <text x="195" y="480" font-size="15" fill="#4a3a2e">&#8226; Derived land surface temperature (LST) surfaces</text>
  <text x="195" y="506" font-size="15" fill="#4a3a2e">&#8226; Calculated tree canopy &amp; impervious surface indices</text>

  <!-- Arrow 2 -->
  <line x1="410" y1="580" x2="410" y2="612" stroke="#c1440e" stroke-width="3"/>
  <polygon points="401,611 419,611 410,621" fill="#c1440e"/>

  <!-- ===== CARD 3: Spatial Analysis (620-820) ===== -->
  <rect x="70" y="620" width="680" height="200" rx="14" fill="#faf1e6" stroke="#e8d9c3" stroke-width="1.5"/>
  <rect x="70" y="620" width="6" height="200" rx="3" fill="#c1440e"/>
  <circle cx="140" cy="720" r="34" fill="#c1440e"/>
  <rect x="112" y="692" width="56" height="56" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="122" y="702" width="36" height="36" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="132" y="712" width="16" height="16" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="195" y="666" font-size="24" font-weight="700" fill="#5c2a12">3. Spatial Analysis</text>
  <text x="195" y="694" font-size="15" fill="#4a3a2e">&#8226; Integrated LST, canopy &amp; demographic layers in ArcGIS Pro</text>
  <text x="195" y="720" font-size="15" fill="#4a3a2e">&#8226; Analyzed patterns at 3 scales: block, block group, neighborhood</text>
  <text x="195" y="746" font-size="15" fill="#4a3a2e">&#8226; Identified areas most vulnerable to extreme heat</text>

  <!-- Arrow 3 -->
  <line x1="410" y1="820" x2="410" y2="852" stroke="#c1440e" stroke-width="3"/>
  <polygon points="401,851 419,851 410,861" fill="#c1440e"/>

  <!-- ===== CARD 4: Dashboard Development (860-1000) ===== -->
  <rect x="70" y="860" width="680" height="140" rx="14" fill="#faf1e6" stroke="#e8d9c3" stroke-width="1.5"/>
  <rect x="70" y="860" width="6" height="140" rx="3" fill="#c1440e"/>
  <circle cx="140" cy="930" r="34" fill="#c1440e"/>
  <rect x="122" y="930" width="10" height="16" fill="#ffffff"/>
  <rect x="136" y="918" width="10" height="28" fill="#ffffff"/>
  <rect x="150" y="908" width="10" height="38" fill="#ffffff"/>
  <line x1="118" y1="946" x2="164" y2="946" stroke="#ffffff" stroke-width="1.5"/>
  <text x="195" y="906" font-size="24" font-weight="700" fill="#5c2a12">4. Dashboard Development</text>
  <text x="195" y="934" font-size="15" fill="#4a3a2e">&#8226; Built 3 interactive dashboards in ArcGIS Online</text>
  <text x="195" y="960" font-size="15" fill="#4a3a2e">&#8226; Designed for use by city staff &amp; the public</text>

  <!-- Arrow 4 -->
  <line x1="410" y1="1000" x2="410" y2="1032" stroke="#c1440e" stroke-width="3"/>
  <polygon points="401,1031 419,1031 410,1041" fill="#c1440e"/>

  <!-- ===== CARD 5: Output & Impact (1040-1260) ===== -->
  <rect x="70" y="1040" width="680" height="220" rx="14" fill="#faf1e6" stroke="#e8d9c3" stroke-width="1.5"/>
  <rect x="70" y="1040" width="6" height="220" rx="3" fill="#c1440e"/>
  <circle cx="140" cy="1100" r="34" fill="#c1440e"/>
  <circle cx="140" cy="1088" r="16" fill="#ffffff"/>
  <rect x="137" y="1100" width="6" height="20" rx="2" fill="#ffffff"/>
  <text x="195" y="1086" font-size="24" font-weight="700" fill="#5c2a12">5. Output &amp; Impact</text>
  <text x="195" y="1114" font-size="15" fill="#4a3a2e">&#8226; Findings guide greening strategy &amp; tree-planting priorities</text>

  <rect x="195" y="1140" width="255" height="70" rx="8" fill="#fdece0" stroke="#c1440e" stroke-width="1.5"/>
  <text x="322" y="1170" text-anchor="middle" font-size="18" font-weight="700" fill="#c1440e">3 Dashboards</text>
  <text x="322" y="1194" text-anchor="middle" font-size="11.5" fill="#6b5c4e">Block &#183; Block Group &#183; Neighborhood scales</text>

  <rect x="470" y="1140" width="255" height="70" rx="8" fill="#fdece0" stroke="#c1440e" stroke-width="1.5"/>
  <text x="597" y="1170" text-anchor="middle" font-size="18" font-weight="700" fill="#c1440e">City Partner</text>
  <text x="597" y="1194" text-anchor="middle" font-size="11.5" fill="#6b5c4e">Presented to Ann Arbor Parks &amp; Forestry Dept.</text>

  <!-- Footer -->
  <text x="410" y="1300" text-anchor="middle" font-size="12" fill="#6b5c4e" font-style="italic">GIS Intern, City of Ann Arbor Office of Sustainability &amp; Innovations &#183; Summer 2026</text>
</svg>
